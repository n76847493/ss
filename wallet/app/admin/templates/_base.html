<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Wallet Admin{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { color-scheme: light dark; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0;
               background: #f4f6f8; color: #222; }
        header { background: #263238; color: #fff; padding: 14px 22px;
                 display: flex; gap: 18px; align-items: center; }
        header a { color: #cfd8dc; text-decoration: none; font-weight: 500; }
        header a:hover { color: #fff; }
        header .title { font-weight: 700; margin-right: 24px; }
        main { padding: 22px; }
        table { border-collapse: collapse; width: 100%; background: #fff;
                box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        th, td { border-bottom: 1px solid #eceff1; padding: 8px 10px; font-size: 13px;
                 text-align: left; }
        th { background: #37474f; color: #fff; }
        tr:nth-child(even) td { background: #fafbfc; }
        code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
        .cards { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                 margin-bottom: 22px; }
        .card { background: #fff; padding: 16px; border-radius: 10px;
                box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .card .label { color: #607d8b; font-size: 12px; text-transform: uppercase;
                       letter-spacing: 0.05em; }
        .card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
        button { background: #455a64; color: #fff; border: 0; padding: 6px 12px;
                 border-radius: 4px; cursor: pointer; font-size: 12px; }
        button.danger { background: #c62828; }
        form { display: inline; }
    </style>
</head>
<body>
<header>
    <span class="title">Wallet Admin</span>
    <a href="/">Overview</a>
    <a href="/users">Users</a>
    <a href="/transactions">Transactions</a>
    <a href="/withdrawals">Withdrawals</a>
    <a href="/audit">Audit log</a>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
